<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Do Things</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Do Things">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#f5f6f8">
<style>
:root{
  --bg:#f5f6f8; --card:#ffffff; --text:#20242b; --text2:#8a919e; --text3:#b9bfc9;
  --line:#ececf0; --blue:#2f7cf6; --blue-soft:#e8f0fe; --yellow:#f7ce46; --red:#f25b58;
  --indigo:#5f6ac4; --teal:#4aa3a2; --tan:#c9a26b; --green:#5fb56a;
  --shadow:0 10px 30px rgba(30,40,60,.14), 0 2px 8px rgba(30,40,60,.08);
  --radius:14px;
}
[data-theme="dark"]{
  --bg:#17181c; --card:#222329; --text:#eceef2; --text2:#9aa0ab; --text3:#5c626d;
  --line:#2e3038; --blue:#4a8df8; --blue-soft:#243a5e; --yellow:#f7ce46; --red:#ff6b66;
  --shadow:0 10px 30px rgba(0,0,0,.5), 0 2px 8px rgba(0,0,0,.35);
}
@media (prefers-color-scheme: dark){
  [data-theme="auto"]{
    --bg:#17181c; --card:#222329; --text:#eceef2; --text2:#9aa0ab; --text3:#5c626d;
    --line:#2e3038; --blue:#4a8df8; --blue-soft:#243a5e; --yellow:#f7ce46; --red:#ff6b66;
    --shadow:0 10px 30px rgba(0,0,0,.5), 0 2px 8px rgba(0,0,0,.35);
  }
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent; touch-action:manipulation;}
html,body{margin:0; padding:0; background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
  font-size:16px; height:100%;}
body{overscroll-behavior-y:none;}
#app{max-width:640px; margin:0 auto; padding:0 14px calc(96px + env(safe-area-inset-bottom));}
button{font:inherit; color:inherit; background:none; border:none; padding:0; cursor:pointer;}
input,textarea,select{font:inherit; color:var(--text); background:transparent; border:none; outline:none;}
textarea{resize:none;}

/* ---------- top bar ---------- */
.topbar{position:sticky; top:0; z-index:20; background:var(--bg);
  padding:calc(10px + env(safe-area-inset-top)) 2px 8px; display:flex; align-items:center; gap:8px;}
.topbar .back{color:var(--blue); font-size:17px; display:flex; align-items:center; gap:2px; padding:6px 8px 6px 0;}
.topbar .spacer{flex:1;}
.iconbtn{width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--text2);}
.iconbtn:active{background:var(--line);}

/* ---------- home ---------- */
.home-title{font-size:30px; font-weight:800; margin:10px 4px 14px;}
.card{background:var(--card); border-radius:var(--radius); box-shadow:0 1px 2px rgba(20,30,50,.05); margin-bottom:16px; overflow:hidden;}
.home-row{display:flex; align-items:center; gap:13px; padding:13px 14px; width:100%; text-align:left; border-bottom:1px solid var(--line); position:relative;}
.card .home-row:last-child{border-bottom:none;}
.home-row .ic{width:26px; height:26px; flex:none; display:flex; align-items:center; justify-content:center;}
.home-row .lbl{font-size:17px; font-weight:600; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.home-row .cnt{color:var(--text2); font-size:15px; font-variant-numeric:tabular-nums;}
.area-head{display:flex; align-items:center; gap:10px; padding:14px 14px 10px; font-size:13px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--teal); border-bottom:1px solid var(--line);}
.area-head .addproj{margin-left:auto; color:var(--text3); font-size:22px; line-height:1; padding:0 2px;}

/* ---------- list view ---------- */
.list-header{display:flex; align-items:center; gap:12px; margin:6px 4px 4px;}
.list-header h1{font-size:28px; font-weight:800; margin:0; flex:1; min-width:0;}
.list-header .ic{width:30px;height:30px;flex:none;display:flex;align-items:center;justify-content:center;}
.list-sub{color:var(--text2); margin:2px 4px 12px; font-size:15px;}
.section-title{display:flex; align-items:center; gap:8px; font-size:15px; font-weight:700; margin:22px 6px 8px; color:var(--text);}
.section-title.dim{color:var(--text2); font-weight:600;}
.date-group{font-size:15px; font-weight:700; margin:20px 6px 6px; color:var(--text);}
.date-group small{color:var(--text2); font-weight:500; margin-left:8px;}

/* ---------- task row ---------- */
.task{display:flex; align-items:flex-start; gap:12px; padding:11px 14px; border-bottom:1px solid var(--line); background:var(--card); width:100%; text-align:left; transition:opacity .45s, transform .45s;}
.task:last-child{border-bottom:none;}
.task.fading{opacity:0; transform:translateX(18px);}
.cb{width:20px; height:20px; border-radius:6px; border:1.6px solid var(--text3); flex:none; margin-top:2px;
  display:flex; align-items:center; justify-content:center; transition:all .15s;}
.cb.round{border-radius:50%;}
.cb.done{background:var(--blue); border-color:var(--blue);}
.cb.done svg{display:block;}
.cb svg{display:none;}
.t-main{flex:1; min-width:0;}
.t-title{font-size:16.5px; line-height:1.35; word-wrap:break-word;}
.t-title.done{color:var(--text2); text-decoration:line-through;}
.t-meta{display:flex; flex-wrap:wrap; gap:6px; margin-top:4px; align-items:center;}
.chip{font-size:12px; padding:2px 9px; border-radius:20px; background:var(--blue-soft); color:var(--blue); font-weight:600;}
.meta-note{font-size:12.5px; color:var(--text2); display:flex; align-items:center; gap:4px;}
.meta-note.red{color:var(--red); font-weight:600;}
.meta-note.yellow{color:#c99700; font-weight:600;}
.t-proj{font-size:12.5px; color:var(--text2); margin-top:3px; display:flex; align-items:center; gap:5px;}
.evening-divider{display:flex; align-items:center; gap:8px; margin:26px 6px 8px; font-weight:700; font-size:15px;}

/* project heading rows */
.heading-row{display:flex; align-items:center; gap:8px; padding:16px 14px 8px; font-weight:700; font-size:15px; color:var(--indigo); border-bottom:1px solid var(--line); background:var(--card);}
.heading-row .hx{margin-left:auto; color:var(--text3); font-size:18px; padding:0 4px;}

/* ---------- editor (expanded to-do) ---------- */
.editor{background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); padding:14px; margin:8px 0; border:1px solid var(--line);}
.editor .row1{display:flex; gap:12px; align-items:flex-start;}
.editor input.title{font-size:17px; font-weight:600; width:100%; padding:0;}
.editor textarea.notes{width:100%; font-size:14.5px; color:var(--text2); margin:8px 0 0 32px; min-height:20px; line-height:1.45;}
.ed-check{margin:10px 0 0 32px;}
.ed-check .ckitem{display:flex; align-items:center; gap:9px; padding:5px 0;}
.ed-check .ckitem input[type=text]{flex:1; font-size:14.5px;}
.ed-check .ckitem .ckx{color:var(--text3); font-size:16px; padding:0 4px;}
.ed-check .ckadd{color:var(--text2); font-size:14px; padding:6px 0 0 0; display:flex; gap:8px; align-items:center;}
.ed-tags{margin:10px 0 0 32px; display:flex; flex-wrap:wrap; gap:6px; align-items:center;}
.ed-tags input{font-size:13px; min-width:90px; flex:1; color:var(--text2);}
.ed-badges{display:flex; flex-wrap:wrap; gap:8px; margin:14px 0 2px 32px;}
.badge{display:flex; align-items:center; gap:6px; font-size:13.5px; font-weight:600; padding:6px 11px; border-radius:9px; background:var(--bg); color:var(--text2);}
.badge.set{background:var(--blue-soft); color:var(--blue);}
.badge.red{color:var(--red);}
.ed-foot{display:flex; align-items:center; margin-top:14px; padding-top:10px; border-top:1px solid var(--line);}
.ed-foot .del{color:var(--red); font-size:14px; font-weight:600; padding:4px 6px;}
.ed-foot .done-btn{margin-left:auto; color:var(--blue); font-weight:700; font-size:15px; padding:4px 6px;}

/* ---------- sheets / overlays ---------- */
.overlay{position:fixed; inset:0; background:rgba(15,18,25,.45); z-index:50; display:flex; align-items:flex-end; justify-content:center;}
.overlay.center{align-items:center; padding:20px;}
.sheet{background:var(--card); width:100%; max-width:640px; border-radius:18px 18px 0 0; padding:16px 16px calc(20px + env(safe-area-inset-bottom)); max-height:82vh; overflow-y:auto;}
.overlay.center .sheet{border-radius:18px; max-height:76vh;}
.sheet h3{margin:2px 4px 12px; font-size:18px;}
.sheet .grid{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
.wopt{display:flex; align-items:center; gap:10px; padding:12px; border-radius:12px; background:var(--bg); font-weight:600; font-size:15px; text-align:left;}
.wopt.sel{background:var(--blue-soft); color:var(--blue);}
.wopt .ic{width:22px; height:22px; display:flex; align-items:center; justify-content:center;}
.sheet .full{grid-column:1/-1;}
.sheet input[type=date]{width:100%; padding:12px; background:var(--bg); border-radius:12px; font-size:15px; -webkit-appearance:none; appearance:none; min-height:46px;}
.sheet select{width:100%; padding:12px; background:var(--bg); border-radius:12px; font-size:15px; -webkit-appearance:none; appearance:none;}
.sheet .clearbtn{width:100%; text-align:center; color:var(--red); font-weight:600; padding:12px; margin-top:8px;}
.moveopt{display:flex; align-items:center; gap:10px; padding:12px 10px; border-bottom:1px solid var(--line); width:100%; text-align:left; font-size:15.5px;}
.moveopt:last-child{border-bottom:none;}
.moveopt .sub{color:var(--text2); font-size:13px; margin-left:auto;}

/* quick entry */
.qe{background:var(--card); width:100%; max-width:640px; border-radius:18px; padding:16px; box-shadow:var(--shadow); margin:0 14px;}
.qe input.qtitle{width:100%; font-size:17px; font-weight:600; padding:2px 0 10px;}
.qe textarea{width:100%; font-size:14px; color:var(--text2); min-height:56px; padding-top:4px;}
.qe .qfoot{display:flex; align-items:center; gap:10px; margin-top:12px; padding-top:10px; border-top:1px solid var(--line);}
.qe .qtarget{font-size:13px; color:var(--text2); display:flex; gap:6px; align-items:center;}
.qe .qsave{margin-left:auto; background:var(--blue); color:#fff; font-weight:700; padding:9px 20px; border-radius:22px; font-size:15px;}
.qe .qsave:disabled{opacity:.4;}

/* search */
.search-wrap{padding:4px 0 10px;}
.search-box{display:flex; align-items:center; gap:8px; background:var(--card); border-radius:12px; padding:10px 12px;}
.search-box input{flex:1; font-size:16px;}
.result-group{font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--text2); margin:18px 6px 6px;}

/* fab */
.fab{position:fixed; right:calc(18px + env(safe-area-inset-right)); bottom:calc(24px + env(safe-area-inset-bottom));
  width:58px; height:58px; border-radius:50%; background:var(--blue); color:#fff; font-size:32px; font-weight:300;
  display:flex; align-items:center; justify-content:center; box-shadow:0 6px 18px rgba(47,124,246,.45); z-index:40;}

/* pie progress */
.pie{transform:rotate(-90deg);}
.pie .bgc{stroke:var(--text3); opacity:.55; fill:none;}
.pie .fgc{stroke:var(--blue); fill:none; stroke-linecap:butt;}

/* misc */
.empty{color:var(--text2); text-align:center; padding:44px 20px; font-size:15px; line-height:1.6;}
.empty .big{font-size:40px; display:block; margin-bottom:10px;}
.tagbar{display:flex; gap:7px; overflow-x:auto; padding:2px 4px 10px; scrollbar-width:none;}
.tagbar::-webkit-scrollbar{display:none;}
.tagbar .chip{flex:none; padding:5px 13px; font-size:13px; background:var(--card); color:var(--text2); border:1px solid var(--line);}
.tagbar .chip.on{background:var(--blue); color:#fff; border-color:var(--blue);}
.settings-row{display:flex; align-items:center; gap:12px; padding:13px 14px; border-bottom:1px solid var(--line); width:100%; text-align:left; font-size:16px;}
.settings-row:last-child{border-bottom:none;}
.settings-row .end{margin-left:auto; color:var(--text2); font-size:14px;}
.footer-note{text-align:center; color:var(--text3); font-size:12.5px; margin:8px 0 20px;}
.notes-preview{font-size:13px; color:var(--text2); margin-top:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}

/* ---------- tactile feedback ---------- */
button,.task,.home-row,.badge,.wopt,.moveopt,.settings-row,.fab,.cb,.area-head,.heading-row{
  -webkit-user-select:none; user-select:none; -webkit-touch-callout:none;}
.overlay{cursor:pointer;}
.sheet,.qe{cursor:auto;}
.home-row,.moveopt,.settings-row,.task{transition:background .12s;}
.home-row:active,.moveopt:active,.settings-row:active{background:var(--line);}
.task:active{background:var(--blue-soft);}
.badge,.wopt,.qsave,.ckadd,.back{transition:transform .1s, background .12s;}
.badge:active,.wopt:active,.ckadd:active{transform:scale(.94);}
.qsave:active{transform:scale(.92);}
.wopt:active{background:var(--line);}
.cb{transition:transform .12s, background .15s, border-color .15s;}
.cb:active{transform:scale(1.18); border-color:var(--blue);}
.cb.pop{animation:cbpop .32s cubic-bezier(.34,1.56,.64,1);}
@keyframes cbpop{0%{transform:scale(.7);}55%{transform:scale(1.3);}100%{transform:scale(1);}}
.editor{animation:edin .18s ease-out;}
@keyframes edin{from{transform:scale(.975);opacity:.55;}to{transform:scale(1);opacity:1;}}
.sheet{animation:sheetup .22s ease-out;}
@keyframes sheetup{from{transform:translateY(28px);opacity:.6;}to{transform:translateY(0);opacity:1;}}
.overlay.center .sheet,.qe{animation:qein .16s ease-out;}
@keyframes qein{from{transform:scale(.94);opacity:.5;}to{transform:scale(1);opacity:1;}}
.fab{transition:transform .12s;}
.fab:active{transform:scale(.88);}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>
<div id="app"></div>
<button class="fab" data-action="quickadd" aria-label="New to-do">+</button>
<div id="modal"></div>
<script>
"use strict";
/* ================= data ================= */
const LS = "things_for_two_v1";
const uid = () => Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
const todayStr = () => { const d = new Date(); return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0"); };

function seed() {
  const aid = uid(), pid = uid(), h1 = uid();
  return {
    version: 1,
    settings: { theme: "auto" },
    areas: [{ id: aid, title: "Life" }],
    projects: [{ id: pid, title: "Welcome 👋", notes: "A quick tour of your new app.", areaId: aid, headings: [{ id: h1, title: "The Basics" }], when: "anytime", deadline: null, completedAt: null }],
    items: [
      { id: uid(), title: "Tap the + button to add a to-do", when: "today", projectId: null, headingId: null, notes: "", checklist: [], tags: [], deadline: null, repeat: null, completedAt: null, created: Date.now(), order: 1 },
      { id: uid(), title: "Tap a to-do to open it — add notes, tags, dates and checklists", when: "today", projectId: null, headingId: null, notes: "", checklist: [], tags: [], deadline: null, repeat: null, completedAt: null, created: Date.now(), order: 2 },
      { id: uid(), title: "Tap the circle to complete a to-do", when: "inbox", projectId: pid, headingId: h1, notes: "", checklist: [], tags: [], deadline: null, repeat: null, completedAt: null, created: Date.now(), order: 3 },
      { id: uid(), title: "Schedule a to-do for This Evening 🌙", when: "evening", projectId: null, headingId: null, notes: "Today keeps a separate space for your evening plans.", checklist: [], tags: [], deadline: null, repeat: null, completedAt: null, created: Date.now(), order: 4 },
      { id: uid(), title: "Explore Upcoming, Anytime and Someday", when: "inbox", projectId: pid, headingId: h1, notes: "", checklist: [], tags: [], deadline: null, repeat: null, completedAt: null, created: Date.now(), order: 5 },
      { id: uid(), title: "Back up your data from Settings (top of the home screen)", when: "someday", projectId: null, headingId: null, notes: "", checklist: [], tags: [], deadline: null, repeat: null, completedAt: null, created: Date.now(), order: 6 }
    ]
  };
}
function load() { try { const raw = localStorage.getItem(LS); return raw ? JSON.parse(raw) : null; } catch (e) { return null; } }
let db = load() || seed();
function save() { localStorage.setItem(LS, JSON.stringify(db)); }
save();

let state = { view: { type: "home" }, stack: [], editing: null, filterTag: null };

/* ================= helpers ================= */
const proj = id => db.projects.find(p => p.id === id);
const area = id => db.areas.find(a => a.id === id);
const isDate = w => /^\d{4}-\d{2}-\d{2}$/.test(w || "");
const esc = s => (s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

function effList(it) {
  if (it.completedAt) return "logbook";
  if (it.when === "today") return "today";
  if (it.when === "evening") return "evening";
  if (it.when === "someday") return "someday";
  if (it.when === "anytime") return "anytime";
  if (isDate(it.when)) return it.when <= todayStr() ? "today" : "upcoming";
  return it.projectId ? "anytime" : "inbox"; // inbox default
}
function deadlineDue(it) { return !it.completedAt && it.deadline && it.deadline <= todayStr(); }
function open(items) { return items.filter(i => !i.completedAt).sort((a,b) => (a.order||0)-(b.order||0)); }
function nextOrder() { return Math.max(0, ...db.items.map(i => i.order||0)) + 1; }

function fmtDate(ds, withYear) {
  const [y,m,d] = ds.split("-").map(Number);
  const dt = new Date(y, m-1, d), t = new Date(); t.setHours(0,0,0,0);
  const diff = Math.round((dt - t) / 86400000);
  if (diff === 0) return "Today";
  if (diff === 1) return "Tomorrow";
  if (diff === -1) return "Yesterday";
  if (diff > 1 && diff < 7) return dt.toLocaleDateString(undefined, { weekday: "long" });
  const opt = { day: "numeric", month: "short" };
  if (withYear || dt.getFullYear() !== t.getFullYear()) opt.year = "numeric";
  return dt.toLocaleDateString(undefined, opt);
}
function deadlineLabel(it) {
  if (!it.deadline) return "";
  const t = new Date(); t.setHours(0,0,0,0);
  const [y,m,d] = it.deadline.split("-").map(Number);
  const diff = Math.round((new Date(y,m-1,d) - t) / 86400000);
  if (diff < 0) return Math.abs(diff) + "d overdue";
  if (diff === 0) return "due today";
  return diff + (diff === 1 ? " day left" : " days left");
}
function addDays(ds, n) { const [y,m,d] = ds.split("-").map(Number); const dt = new Date(y,m-1,d+n); return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0"); }
function addMonths(ds, n) { const [y,m,d] = ds.split("-").map(Number); const dt = new Date(y,m-1+n,d); return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0"); }
function nextRepeatDate(it) {
  const base = isDate(it.when) ? it.when : todayStr();
  switch (it.repeat) {
    case "daily": return addDays(base, 1);
    case "weekly": return addDays(base, 7);
    case "monthly": return addMonths(base, 1);
    case "yearly": return addMonths(base, 12);
  }
  return null;
}

/* ================= icons ================= */
const IC = {
  inbox: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#5b8dd6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.4 5.1 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.4-6.9A2 2 0 0 0 16.8 4H7.2a2 2 0 0 0-1.8 1.1z"/></svg>',
  today: '<svg width="24" height="24" viewBox="0 0 24 24" fill="#f7ce46" stroke="#e6b800" stroke-width="1"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>',
  upcoming: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#e2626f" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="3"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
  anytime: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4aa3a2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>',
  someday: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#c9a26b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8v13H3V8"/><path d="M1 3h22v5H1z"/><path d="M10 12h4"/></svg>',
  logbook: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#5fb56a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
  moon: '<svg width="18" height="18" viewBox="0 0 24 24" fill="#5f6ac4"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>',

  list: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>'
};
function pieIcon(p, size) {
  const items = db.items.filter(i => i.projectId === p.id);
  const done = items.filter(i => i.completedAt).length;
  const frac = items.length ? done / items.length : 0;
  const r = (size - 6) / 2, mid = size / 2;
  return '<svg class="pie" width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '">' +
    '<circle class="bgc" cx="' + mid + '" cy="' + mid + '" r="' + r + '" stroke-width="1.8"/>' +
    '<circle class="fgc" cx="' + mid + '" cy="' + mid + '" r="' + (r/2) + '" stroke-width="' + r + '" stroke-dasharray="' + (frac * Math.PI * r) + ' ' + (Math.PI * r) + '"/></svg>';
}

/* ================= rendering ================= */
const $app = document.getElementById("app");
const $modal = document.getElementById("modal");

function render() {
  document.documentElement.setAttribute("data-theme", db.settings.theme || "auto");
  const v = state.view;
  if (v.type === "home") $app.innerHTML = rHome();
  else if (v.type === "list") $app.innerHTML = rSmartList(v.id);
  else if (v.type === "project") $app.innerHTML = rProject(v.id);
  else if (v.type === "area") $app.innerHTML = rArea(v.id);
  else if (v.type === "search") $app.innerHTML = rSearch(v.q || "");
  else if (v.type === "settings") $app.innerHTML = rSettings();
  document.querySelector(".fab").style.display = (v.type === "search" || v.type === "settings") ? "none" : "flex";
}

function topbar() {
  return '<div class="topbar">' +
    (state.stack.length ? '<button class="back" data-action="back">&#8249; Back</button>' : '<span></span>') +
    '<span class="spacer"></span>' +
    '<button class="iconbtn" data-action="opensearch">' + IC.search + '</button>' +
    (state.view.type === "home" ? '<button class="iconbtn" data-action="opensettings">' + IC.gear + '</button>' : '') +
    '</div>';
}

function rHome() {
  let h = topbar() + '<div class="home-title">Do Things</div>';
  const smart = [
    ["inbox", "Inbox", IC.inbox], ["today", "Today", IC.today], ["upcoming", "Upcoming", IC.upcoming],
    ["anytime", "Anytime", IC.anytime], ["someday", "Someday", IC.someday], ["logbook", "Logbook", IC.logbook]
  ];
  h += '<div class="card">' + smart.map(([id, lbl, ic]) => {
    let n = "";
    if (id === "today") n = db.items.filter(i => !i.completedAt && (["today","evening"].includes(effList(i)) || deadlineDue(i))).length || "";
    else if (id !== "logbook") n = db.items.filter(i => effList(i) === id).length || "";
    return '<button class="home-row" data-action="golist" data-id="' + id + '"><span class="ic">' + ic + '</span><span class="lbl">' + lbl + '</span>' + (n ? '<span class="cnt">' + n + '</span>' : '') + '</button>';
  }).join("") + '</div>';

  for (const a of db.areas) {
    const ps = db.projects.filter(p => p.areaId === a.id && !p.completedAt);
    h += '<div class="card"><button class="area-head" data-action="goarea" data-id="' + a.id + '" style="width:100%;text-align:left">' + esc(a.title) +
      '<span class="addproj" data-action="addproject" data-id="' + a.id + '">+</span></button>' +
      ps.map(p => projRow(p)).join("") + '</div>';
  }
  const loose = db.projects.filter(p => !p.areaId && !p.completedAt);
  if (loose.length) h += '<div class="card">' + loose.map(p => projRow(p)).join("") + '</div>';

  h += '<div class="card">' +
    '<button class="home-row" data-action="addarea"><span class="ic" style="color:var(--text3);font-size:22px">+</span><span class="lbl" style="color:var(--text2);font-weight:500">New Area</span></button>' +
    '<button class="home-row" data-action="addproject" data-id=""><span class="ic" style="color:var(--text3);font-size:22px">+</span><span class="lbl" style="color:var(--text2);font-weight:500">New Project</span></button></div>';
  h += '<div class="footer-note">Data lives on this phone · back up in Settings ⚙ · v3</div>';
  return h;
}
function projRow(p) {
  const openN = db.items.filter(i => i.projectId === p.id && !i.completedAt).length;
  return '<button class="home-row" data-action="goproject" data-id="' + p.id + '"><span class="ic">' + pieIcon(p, 22) + '</span><span class="lbl">' + esc(p.title) + '</span>' + (openN ? '<span class="cnt">' + openN + '</span>' : '') + '</button>';
}

/* ---- smart lists ---- */
const LIST_META = {
  inbox: ["Inbox", IC.inbox, "Collect quick thoughts here, then organize them."],
  today: ["Today", IC.today, ""],
  upcoming: ["Upcoming", IC.upcoming, ""],
  anytime: ["Anytime", IC.anytime, "To-dos you could do any time."],
  someday: ["Someday", IC.someday, "Ideas for later — no pressure."],
  logbook: ["Logbook", IC.logbook, ""]
};

function taskRow(it, opts) {
  opts = opts || {};
  if (state.editing === it.id) return editorCard(it);
  const done = !!it.completedAt || it._completing;
  const p = it.projectId ? proj(it.projectId) : null;
  let meta = "";
  if (it.tags && it.tags.length) meta += it.tags.map(t => '<span class="chip">' + esc(t) + '</span>').join("");
  if (it.checklist && it.checklist.length) meta += '<span class="meta-note">' + IC.list + ' ' + it.checklist.filter(c => c.done).length + "/" + it.checklist.length + '</span>';
  if (isDate(it.when) && opts.showDate) meta += '<span class="meta-note yellow">' + IC.cal + ' ' + fmtDate(it.when) + '</span>';
  if (it.repeat) meta += '<span class="meta-note">' + IC.repeat + '</span>';
  if (it.deadline && !it.completedAt) meta += '<span class="meta-note ' + (deadlineDue(it) ? "red" : "") + '">' + IC.flag + ' ' + deadlineLabel(it) + '</span>';
  const sub = (p && opts.showProject) ? '<div class="t-proj">' + pieIcon(p, 14) + ' ' + esc(p.title) + '</div>' : "";
  const notesPrev = it.notes && !opts.hideNotes ? '<div class="notes-preview">' + esc(it.notes.split("\n")[0]) + '</div>' : "";
  return '<div class="task' + (it._fading ? " fading" : "") + '" data-taskid="' + it.id + '">' +
    '<button class="cb' + (done ? " done" : "") + (it._completing ? " pop" : "") + '" data-action="toggle" data-id="' + it.id + '">' + IC.check + '</button>' +
    '<button data-action="edit" data-id="' + it.id + '" style="all:unset;flex:1;min-width:0;cursor:pointer">' +
    '<div class="t-title' + (done ? " done" : "") + '">' + esc(it.title || "New To-Do") + '</div>' + notesPrev +
    (meta ? '<div class="t-meta">' + meta + '</div>' : "") + sub + '</button></div>';
}

function tagbar(items) {
  const tags = [...new Set(items.flatMap(i => i.tags || []))];
  if (!tags.length && !state.filterTag) return "";
  if (state.filterTag && !tags.includes(state.filterTag)) tags.push(state.filterTag);
  return '<div class="tagbar">' + tags.map(t =>
    '<button class="chip' + (state.filterTag === t ? " on" : "") + '" data-action="filtertag" data-tag="' + esc(t) + '">' + esc(t) + '</button>').join("") + '</div>';
}
function applyTagFilter(items) { return state.filterTag ? items.filter(i => (i.tags || []).includes(state.filterTag)) : items; }

function rSmartList(id) {
  const [title, ic, blurb] = LIST_META[id];
  let h = topbar() + '<div class="list-header"><span class="ic">' + ic + '</span><h1>' + title + '</h1></div>';
  if (id === "today") h += '<div class="list-sub">' + new Date().toLocaleDateString(undefined, { weekday: "long", day: "numeric", month: "long" }) + '</div>';
  else if (blurb) h += '<div class="list-sub">' + blurb + '</div>';

  if (id === "today") {
    let day = open(db.items.filter(i => effList(i) === "today" || (deadlineDue(i) && !["today","evening","logbook"].includes(effList(i)))));
    let eve = open(db.items.filter(i => effList(i) === "evening"));
    const all = [...day, ...eve];
    day = applyTagFilter(day); eve = applyTagFilter(eve);
    h += tagbar(all);
    if (!day.length && !eve.length) h += emptyMsg("☀️", "Nothing on today’s plate.<br>Enjoy the free time — or plan something!");
    if (day.length) h += '<div class="card">' + day.map(i => taskRow(i, { showProject: true })).join("") + '</div>';
    if (eve.length) h += '<div class="evening-divider">' + IC.moon + ' This Evening</div><div class="card">' + eve.map(i => taskRow(i, { showProject: true })).join("") + '</div>';
  } else if (id === "upcoming") {
    let items = open(db.items.filter(i => effList(i) === "upcoming"));
    h += tagbar(items);
    items = applyTagFilter(items);
    if (!items.length) h += emptyMsg("📅", "Nothing scheduled yet.<br>Open a to-do and pick a date.");
    const groups = {};
    items.forEach(i => { (groups[i.when] = groups[i.when] || []).push(i); });
    Object.keys(groups).sort().forEach(d => {
      h += '<div class="date-group">' + fmtDate(d) + '<small>' + new Date(d + "T00:00").toLocaleDateString(undefined, { day: "numeric", month: "short" }) + '</small></div>';
      h += '<div class="card">' + groups[d].map(i => taskRow(i, { showProject: true })).join("") + '</div>';
    });
  } else if (id === "anytime") {
    let items = open(db.items.filter(i => effList(i) === "anytime"));
    h += tagbar(items);
    items = applyTagFilter(items);
    if (!items.length) h += emptyMsg("🍃", "Nothing here yet.");
    const noProj = items.filter(i => !i.projectId);
    if (noProj.length) h += '<div class="card">' + noProj.map(i => taskRow(i)).join("") + '</div>';
    for (const p of db.projects.filter(p => !p.completedAt)) {
      const ins = items.filter(i => i.projectId === p.id);
      if (!ins.length) continue;
      h += '<div class="section-title">' + pieIcon(p, 16) + ' ' + esc(p.title) + '</div><div class="card">' + ins.map(i => taskRow(i)).join("") + '</div>';
    }
  } else if (id === "logbook") {
    const items = db.items.filter(i => i.completedAt).sort((a,b) => b.completedAt - a.completedAt);
    if (!items.length) h += emptyMsg("📗", "Completed to-dos will appear here.");
    const groups = {};
    items.forEach(i => { const d = new Date(i.completedAt); const k = d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0"); (groups[k] = groups[k] || []).push(i); });
    Object.keys(groups).sort().reverse().forEach(d => {
      h += '<div class="date-group" style="color:var(--green)">' + fmtDate(d) + '</div><div class="card">' + groups[d].map(i => taskRow(i, { showProject: true, hideNotes: true })).join("") + '</div>';
    });
  } else { // inbox, someday
    let items = open(db.items.filter(i => effList(i) === id));
    h += tagbar(items);
    items = applyTagFilter(items);
    if (!items.length) h += emptyMsg(id === "inbox" ? "📥" : "🌅", id === "inbox" ? "Inbox zero. Nice." : "Dreams live here. Add some!");
    else h += '<div class="card">' + items.map(i => taskRow(i, { showProject: true })).join("") + '</div>';
  }
  return h;
}
function emptyMsg(icon, text) { return '<div class="empty"><span class="big">' + icon + '</span>' + text + '</div>'; }

function rProject(id) {
  const p = proj(id);
  if (!p) { state.view = { type: "home" }; return rHome(); }
  const a = p.areaId ? area(p.areaId) : null;
  let h = topbar() + '<div class="list-header"><span class="ic">' + pieIcon(p, 26) + '</span><h1 contenteditable="true" data-editfield="ptitle" data-id="' + p.id + '">' + esc(p.title) + '</h1></div>';
  if (a) h += '<div class="list-sub">' + esc(a.title) + '</div>';
  h += '<div class="list-sub" style="margin-top:-6px"><span contenteditable="true" data-editfield="pnotes" data-id="' + p.id + '" style="display:block;min-height:18px" data-placeholder="Notes">' + esc(p.notes || "") + '</span></div>';
  if (p.deadline) h += '<div class="list-sub" style="color:var(--red);font-weight:600;display:flex;align-items:center;gap:5px">' + IC.flag + ' Deadline: ' + fmtDate(p.deadline) + '</div>';

  let items = open(db.items.filter(i => i.projectId === id));
  h += tagbar(items);
  items = applyTagFilter(items);
  const noHead = items.filter(i => !i.headingId || !(p.headings || []).some(hh => hh.id === i.headingId));
  let body = noHead.map(i => taskRow(i, { showDate: true })).join("");
  for (const hd of (p.headings || [])) {
    body += '<div class="heading-row"><span contenteditable="true" data-editfield="heading" data-id="' + p.id + '" data-hid="' + hd.id + '">' + esc(hd.title) + '</span>' +
      '<button class="hx" data-action="addtohead" data-id="' + p.id + '" data-hid="' + hd.id + '">+</button></div>';
    body += items.filter(i => i.headingId === hd.id).map(i => taskRow(i, { showDate: true })).join("");
  }
  if (body) h += '<div class="card">' + body + '</div>';
  else h += emptyMsg("📂", "This project is empty.<br>Tap + to add the first step.");

  const doneN = db.items.filter(i => i.projectId === id && i.completedAt).length;
  if (doneN) h += '<div class="list-sub" style="text-align:center">' + doneN + ' completed — see Logbook</div>';
  h += '<div style="display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap">' +
    '<button class="badge" data-action="addheading" data-id="' + p.id + '">+ Heading</button>' +
    '<button class="badge" data-action="projdeadline" data-id="' + p.id + '">' + IC.flag + ' Deadline</button>' +
    '<button class="badge" data-action="projmove" data-id="' + p.id + '">Move</button>' +
    '<button class="badge" data-action="projcomplete" data-id="' + p.id + '" style="color:var(--green)">✓ Complete Project</button>' +
    '<button class="badge red" data-action="projdelete" data-id="' + p.id + '">Delete</button></div>';
  return h;
}

function rArea(id) {
  const a = area(id);
  if (!a) { state.view = { type: "home" }; return rHome(); }
  let h = topbar() + '<div class="list-header"><h1 contenteditable="true" data-editfield="atitle" data-id="' + a.id + '">' + esc(a.title) + '</h1></div>';
  const ps = db.projects.filter(p => p.areaId === id && !p.completedAt);
  if (ps.length) h += '<div class="card">' + ps.map(p => projRow(p)).join("") + '</div>';
  const items = open(db.items.filter(i => !i.projectId && i.areaId === id));
  if (items.length) h += '<div class="card">' + items.map(i => taskRow(i, { showDate: true })).join("") + '</div>';
  if (!ps.length && !items.length) h += emptyMsg("🗂", "Nothing in this area yet.");
  h += '<div style="display:flex;gap:10px;justify-content:center;margin-top:16px">' +
    '<button class="badge" data-action="addproject" data-id="' + id + '">+ Project</button>' +
    '<button class="badge red" data-action="areadelete" data-id="' + id + '">Delete Area</button></div>';
  return h;
}

/* ---- editor ---- */
function editorCard(it) {
  const whenLbl = it.when === "inbox" ? "When" : it.when === "evening" ? "This Evening" : isDate(it.when) ? fmtDate(it.when) : it.when[0].toUpperCase() + it.when.slice(1);
  const p = it.projectId ? proj(it.projectId) : null;
  return '<div class="editor" data-taskid="' + it.id + '">' +
    '<div class="row1"><button class="cb' + (it.completedAt ? " done" : "") + '" data-action="toggle" data-id="' + it.id + '">' + IC.check + '</button>' +
    '<input class="title" data-live="title" data-id="' + it.id + '" value="' + esc(it.title) + '" placeholder="New To-Do"></div>' +
    '<textarea class="notes" data-live="notes" data-id="' + it.id + '" placeholder="Notes" rows="1">' + esc(it.notes || "") + '</textarea>' +
    '<div class="ed-check">' +
      (it.checklist || []).map(c => '<div class="ckitem"><button class="cb round' + (c.done ? " done" : "") + '" style="width:17px;height:17px" data-action="ckt" data-id="' + it.id + '" data-cid="' + c.id + '">' + IC.check + '</button>' +
        '<input type="text" data-live="cktext" data-id="' + it.id + '" data-cid="' + c.id + '" value="' + esc(c.text) + '" placeholder="Checklist item">' +
        '<button class="ckx" data-action="ckdel" data-id="' + it.id + '" data-cid="' + c.id + '">✕</button></div>').join("") +
      '<button class="ckadd" data-action="ckadd" data-id="' + it.id + '">+ Checklist item</button></div>' +
    '<div class="ed-tags">' + (it.tags || []).map(t => '<button class="chip" data-action="tagdel" data-id="' + it.id + '" data-tag="' + esc(t) + '">' + esc(t) + ' ✕</button>').join("") +
      '<input placeholder="Add tag ↵" data-key="tagadd" data-id="' + it.id + '">' +
    '</div>' +
    '<div class="ed-badges">' +
      '<button class="badge' + (it.when !== "inbox" ? " set" : "") + '" data-action="when" data-id="' + it.id + '">' + IC.cal + ' ' + whenLbl + '</button>' +
      '<button class="badge' + (it.deadline ? " set red" : "") + '" data-action="deadline" data-id="' + it.id + '">' + IC.flag + ' ' + (it.deadline ? fmtDate(it.deadline) : "Deadline") + '</button>' +
      '<button class="badge' + (it.repeat ? " set" : "") + '" data-action="repeat" data-id="' + it.id + '">' + IC.repeat + ' ' + (it.repeat ? it.repeat[0].toUpperCase() + it.repeat.slice(1) : "Repeat") + '</button>' +
      '<button class="badge' + (p ? " set" : "") + '" data-action="move" data-id="' + it.id + '">' + IC.list + ' ' + (p ? esc(p.title) : "Move") + '</button></div>' +
    '<div class="ed-foot"><button class="del" data-action="del" data-id="' + it.id + '">Delete</button>' +
    '<button class="done-btn" data-action="closeedit">Done</button></div></div>';
}

/* ---- search ---- */
function rSearch(q) {
  let h = '<div class="topbar"><button class="back" data-action="back">&#8249; Back</button><span class="spacer"></span></div>' +
    '<div class="search-wrap"><div class="search-box">' + IC.search +
    '<input id="searchinput" placeholder="Quick Find" value="' + esc(q) + '" data-key="search" autocomplete="off"></div></div>';
  if (!q) {
    h += '<div class="result-group">Jump to</div><div class="card">' +
      ["inbox","today","upcoming","anytime","someday","logbook"].map(id =>
        '<button class="home-row" data-action="golist" data-id="' + id + '"><span class="ic">' + LIST_META[id][1] + '</span><span class="lbl">' + LIST_META[id][0] + '</span></button>').join("") +
      db.projects.filter(p => !p.completedAt).map(p => projRow(p)).join("") + '</div>';
    return h;
  }
  const ql = q.toLowerCase();
  const hitItem = db.items.filter(i => (i.title + " " + (i.notes||"") + " " + (i.tags||[]).join(" ")).toLowerCase().includes(ql));
  const hitProj = db.projects.filter(p => p.title.toLowerCase().includes(ql));
  const hitArea = db.areas.filter(a => a.title.toLowerCase().includes(ql));
  if (!hitItem.length && !hitProj.length && !hitArea.length) return h + emptyMsg("🔍", "No results for “" + esc(q) + "”");
  if (hitProj.length || hitArea.length) h += '<div class="result-group">Lists</div><div class="card">' +
    hitArea.map(a => '<button class="home-row" data-action="goarea" data-id="' + a.id + '"><span class="lbl">' + esc(a.title) + '</span></button>').join("") +
    hitProj.map(p => projRow(p)).join("") + '</div>';
  const openHits = hitItem.filter(i => !i.completedAt), doneHits = hitItem.filter(i => i.completedAt);
  if (openHits.length) h += '<div class="result-group">To-Dos</div><div class="card">' + openHits.map(i => taskRow(i, { showProject: true, showDate: true })).join("") + '</div>';
  if (doneHits.length) h += '<div class="result-group">Logbook</div><div class="card">' + doneHits.slice(0, 20).map(i => taskRow(i, { showProject: true, hideNotes: true })).join("") + '</div>';
  return h;
}

/* ---- settings ---- */
function rSettings() {
  const th = db.settings.theme || "auto";
  const nOpen = db.items.filter(i => !i.completedAt).length, nDone = db.items.filter(i => i.completedAt).length;
  return '<div class="topbar"><button class="back" data-action="back">&#8249; Back</button><span class="spacer"></span></div>' +
    '<div class="home-title">Settings</div>' +
    '<div class="card">' +
    '<button class="settings-row" data-action="theme"><span>Appearance</span><span class="end">' + th[0].toUpperCase() + th.slice(1) + ' ›</span></button></div>' +
    '<div class="card">' +
    '<button class="settings-row" data-action="export"><span>Export backup (JSON)</span><span class="end">↓</span></button>' +
    '<label class="settings-row" style="cursor:pointer"><span>Import backup</span><span class="end">↑</span><input type="file" id="importfile" accept=".json,application/json" style="display:none"></label></div>' +
    '<div class="footer-note">' + nOpen + ' open · ' + nDone + ' completed<br>All data is stored only on this device.</div>';
}

/* ================= modals ================= */
function closeModal() { $modal.innerHTML = ""; }
function whenSheet(id) {
  const it = db.items.find(x => x.id === id); if (!it) return;
  const opts = [
    ["today", "Today", IC.today], ["evening", "This Evening", IC.moon],
    ["anytime", "Anytime", IC.anytime], ["someday", "Someday", IC.someday]
  ];
  $modal.innerHTML = '<div class="overlay" data-action="closemodal"><div class="sheet"><h3>When</h3><div class="grid">' +
    opts.map(([v, l, ic]) => '<button class="wopt' + (it.when === v ? " sel" : "") + '" data-action="setwhen" data-id="' + id + '" data-v="' + v + '"><span class="ic">' + ic + '</span>' + l + '</button>').join("") +
    '<button class="wopt' + (it.when === addDays(todayStr(),1) ? " sel" : "") + '" data-action="setwhen" data-id="' + id + '" data-v="' + addDays(todayStr(), 1) + '"><span class="ic">' + IC.cal + '</span>Tomorrow</button>' +
    '<button class="wopt' + (isDate(it.when) ? " sel" : "") + '" data-action="pickdate" data-id="' + id + '"><span class="ic">' + IC.cal + '</span>Pick a date…</button>' +
    '<div class="full" id="dateslot"' + (isDate(it.when) ? "" : ' style="display:none"') + '><input type="date" id="whendate" value="' + (isDate(it.when) ? it.when : "") + '" min="' + todayStr() + '"></div></div>' +
    '<button class="clearbtn" data-action="setwhen" data-id="' + id + '" data-v="inbox">Clear (back to Inbox)</button></div></div>';
  const wd = document.getElementById("whendate");
  wd.addEventListener("change", () => { if (wd.value) { it.when = wd.value; save(); closeModal(); render(); } });
}
function deadlineSheet(id) {
  const it = db.items.find(x => x.id === id); if (!it) return;
  $modal.innerHTML = '<div class="overlay" data-action="closemodal"><div class="sheet"><h3>Deadline</h3>' +
    '<input type="date" id="dldate" value="' + (it.deadline || "") + '">' +
    '<button class="clearbtn" data-action="cleardl" data-id="' + id + '">Remove deadline</button></div></div>';
  const dd = document.getElementById("dldate");
  dd.addEventListener("change", () => { if (dd.value) { it.deadline = dd.value; save(); closeModal(); render(); } });
}
function repeatSheet(id) {
  const it = db.items.find(x => x.id === id); if (!it) return;
  const opts = [["", "No repeat"], ["daily", "Every day"], ["weekly", "Every week"], ["monthly", "Every month"], ["yearly", "Every year"]];
  $modal.innerHTML = '<div class="overlay" data-action="closemodal"><div class="sheet"><h3>Repeat</h3>' +
    opts.map(([v, l]) => '<button class="moveopt" data-action="setrepeat" data-id="' + id + '" data-v="' + v + '">' + l + ((it.repeat || "") === v ? ' <span class="sub">✓</span>' : "") + '</button>').join("") +
    '<div class="footer-note" style="margin-top:12px">When you complete it, the next one is scheduled automatically.</div></div></div>';
}
function moveSheet(id) {
  const it = db.items.find(x => x.id === id); if (!it) return;
  let h = '<div class="overlay" data-action="closemodal"><div class="sheet"><h3>Move to</h3>' +
    '<button class="moveopt" data-action="setproj" data-id="' + id + '" data-v="">' + IC.inbox + ' &nbsp;No project' + (!it.projectId ? ' <span class="sub">✓</span>' : "") + '</button>';
  for (const p of db.projects.filter(p => !p.completedAt)) {
    const a = p.areaId ? area(p.areaId) : null;
    h += '<button class="moveopt" data-action="setproj" data-id="' + id + '" data-v="' + p.id + '">' + pieIcon(p, 16) + ' &nbsp;' + esc(p.title) +
      '<span class="sub">' + (it.projectId === p.id ? "✓" : (a ? esc(a.title) : "")) + '</span></button>';
  }
  $modal.innerHTML = h + '</div></div>';
}
function quickEntry() {
  const v = state.view;
  let targetLbl = "Inbox", ticon = IC.inbox;
  if (v.type === "list" && v.id !== "logbook") { targetLbl = LIST_META[v.id][0]; ticon = LIST_META[v.id][1]; }
  else if (v.type === "project") { const p = proj(v.id); targetLbl = p ? p.title : "Inbox"; ticon = p ? pieIcon(p, 16) : IC.inbox; }
  else if (v.type === "area") { const a = area(v.id); targetLbl = a ? a.title : "Inbox"; ticon = IC.anytime; }
  $modal.innerHTML = '<div class="overlay center" data-action="closemodal"><div class="qe">' +
    '<input class="qtitle" id="qtitle" placeholder="New To-Do" autocomplete="off">' +
    '<textarea id="qnotes" placeholder="Notes" rows="3"></textarea>' +
    '<div class="qfoot"><span class="qtarget">' + ticon + ' ' + esc(targetLbl) + '</span>' +
    '<button class="qsave" data-action="qsave">Save</button></div></div></div>';
  setTimeout(() => document.getElementById("qtitle").focus(), 60);
  document.getElementById("qtitle").addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); doQuickSave(); } });
  // direct binding as well — belt and braces for mobile Safari
  const sv = $modal.querySelector('[data-action="qsave"]');
  if (sv) sv.addEventListener("click", e => { e.stopPropagation(); doQuickSave(); });
}
function doQuickSave() {
  const tEl = document.getElementById("qtitle"), nEl = document.getElementById("qnotes");
  let t = String((tEl && tEl.value) || "").trim();
  let notes = String((nEl && nEl.value) || "").trim();
  if (!t && !notes) { closeModal(); return; }
  if (!t) { // note-only entry: promote the first line to the title instead of discarding
    const lines = notes.split("\n");
    t = (lines.shift() || "").trim().slice(0, 140) || "New To-Do";
    notes = lines.join("\n").trim();
  }
  const v = state.view;
  const it = { id: uid(), title: t, notes, checklist: [], tags: [], when: "inbox", deadline: null, repeat: null, projectId: null, headingId: null, areaId: null, completedAt: null, created: Date.now(), order: nextOrder() };
  if (v.type === "list") {
    if (["today","someday","anytime"].includes(v.id)) it.when = v.id;
    else if (v.id === "upcoming") it.when = addDays(todayStr(), 1);
  } else if (v.type === "project") { it.projectId = v.id; it.when = "anytime"; }
  else if (v.type === "area") { it.areaId = v.id; it.when = "anytime"; }
  db.items.push(it); save(); buzz(8); closeModal(); render();
}
function themeSheet() {
  $modal.innerHTML = '<div class="overlay" data-action="closemodal"><div class="sheet"><h3>Appearance</h3>' +
    ["auto","light","dark"].map(t => '<button class="moveopt" data-action="settheme" data-v="' + t + '">' + t[0].toUpperCase() + t.slice(1) +
      ((db.settings.theme || "auto") === t ? ' <span class="sub">✓</span>' : "") + '</button>').join("") + '</div></div>';
}
function projMoveSheet(id) {
  let h = '<div class="overlay" data-action="closemodal"><div class="sheet"><h3>Move project to</h3>' +
    '<button class="moveopt" data-action="setprojarea" data-id="' + id + '" data-v="">No area</button>' +
    db.areas.map(a => '<button class="moveopt" data-action="setprojarea" data-id="' + id + '" data-v="' + a.id + '">' + esc(a.title) + '</button>').join("");
  $modal.innerHTML = h + '</div></div>';
}

/* ================= actions ================= */
function buzz(ms) { try { if (navigator.vibrate) navigator.vibrate(ms); } catch (_) {} }
function go(view) { state.stack.push(state.view); state.view = view; state.editing = null; state.filterTag = null; render(); window.scrollTo(0, 0); }
function goBack() { state.view = state.stack.pop() || { type: "home" }; state.editing = null; state.filterTag = null; render(); }

function completeItem(it) {
  it._completing = true; buzz(12); render();
  setTimeout(() => {
    if (!it._completing) return; // was un-checked during the grace period
    const el = document.querySelector('[data-taskid="' + it.id + '"]');
    if (el) el.classList.add("fading");
    setTimeout(() => {
      if (!it._completing) return;
      it._completing = false;
      it.completedAt = Date.now();
      if (it.repeat) {
        const nd = nextRepeatDate(it);
        const copy = JSON.parse(JSON.stringify(it));
        copy.id = uid(); copy.completedAt = null; copy.when = nd; copy.created = Date.now(); copy.order = nextOrder();
        delete copy._completing; delete copy._fading;
        (copy.checklist || []).forEach(c => c.done = false);
        db.items.push(copy);
      }
      save(); render();
    }, 380);
  }, 650);
}

document.addEventListener("click", e => {
  const el = e.target.closest("[data-action]");
  if (!el) return;
  const act = el.dataset.action, id = el.dataset.id;
  if (act !== "closemodal") e.stopPropagation();
  switch (act) {
    case "back": goBack(); break;
    case "golist": closeModal(); go({ type: "list", id }); break;
    case "goproject": closeModal(); go({ type: "project", id }); break;
    case "goarea": closeModal(); go({ type: "area", id }); break;
    case "opensearch": go({ type: "search", q: "" }); setTimeout(() => { const s = document.getElementById("searchinput"); if (s) s.focus(); }, 80); break;
    case "opensettings": go({ type: "settings" }); break;
    case "quickadd": quickEntry(); break;
    case "qsave": doQuickSave(); break;
    case "closemodal": if (e.target === el) closeModal(); break;
    case "toggle": {
      const it = db.items.find(x => x.id === id); if (!it) break;
      if (it.completedAt) { it.completedAt = null; save(); render(); }
      else if (it._completing) { it._completing = false; render(); }
      else completeItem(it);
      break;
    }
    case "edit": state.editing = id; render(); break;
    case "closeedit": {
      const it = db.items.find(x => x.id === state.editing);
      if (it && !it.title.trim()) db.items = db.items.filter(x => x.id !== it.id);
      state.editing = null; save(); render(); break;
    }
    case "del": {
      if (!confirm("Delete this to-do?")) break;
      db.items = db.items.filter(x => x.id !== id); state.editing = null; save(); render(); break;
    }
    case "when": whenSheet(id); break;
    case "setwhen": { const it = db.items.find(x => x.id === id); if (it) { it.when = el.dataset.v; save(); } closeModal(); render(); break; }
    case "pickdate": { const slot = document.getElementById("dateslot"); slot.style.display = "block"; const wd = document.getElementById("whendate"); wd.focus(); if (wd.showPicker) try { wd.showPicker(); } catch (_) {} break; }
    case "deadline": deadlineSheet(id); break;
    case "cleardl": { const it = db.items.find(x => x.id === id); if (it) { it.deadline = null; save(); } closeModal(); render(); break; }
    case "repeat": repeatSheet(id); break;
    case "setrepeat": { const it = db.items.find(x => x.id === id); if (it) { it.repeat = el.dataset.v || null; save(); } closeModal(); render(); break; }
    case "move": moveSheet(id); break;
    case "setproj": { const it = db.items.find(x => x.id === id); if (it) { it.projectId = el.dataset.v || null; it.headingId = null; save(); } closeModal(); render(); break; }
    case "tagdel": { const it = db.items.find(x => x.id === id); if (it) { it.tags = it.tags.filter(t => t !== el.dataset.tag); save(); render(); } break; }
    case "ckt": { const it = db.items.find(x => x.id === id); const c = it && it.checklist.find(c => c.id === el.dataset.cid); if (c) { c.done = !c.done; if (c.done) buzz(8); save(); render(); } break; }
    case "ckdel": { const it = db.items.find(x => x.id === id); if (it) { it.checklist = it.checklist.filter(c => c.id !== el.dataset.cid); save(); render(); } break; }
    case "ckadd": { const it = db.items.find(x => x.id === id); if (it) { it.checklist.push({ id: uid(), text: "", done: false }); save(); render(); setTimeout(() => { const ins = document.querySelectorAll('.ckitem input[type=text]'); if (ins.length) ins[ins.length-1].focus(); }, 50); } break; }
    case "filtertag": state.filterTag = state.filterTag === el.dataset.tag ? null : el.dataset.tag; render(); break;
    case "addarea": { const t = prompt("Name your new area:"); if (t && t.trim()) { db.areas.push({ id: uid(), title: t.trim() }); save(); render(); } break; }
    case "addproject": { const t = prompt("Name your new project:"); if (t && t.trim()) { const p = { id: uid(), title: t.trim(), notes: "", areaId: id || null, headings: [], when: "anytime", deadline: null, completedAt: null }; db.projects.push(p); save(); go({ type: "project", id: p.id }); } break; }
    case "addheading": { const p = proj(id); const t = prompt("Heading name:"); if (p && t && t.trim()) { p.headings = p.headings || []; p.headings.push({ id: uid(), title: t.trim() }); save(); render(); } break; }
    case "addtohead": { const t = prompt("New to-do:"); if (t && t.trim()) { db.items.push({ id: uid(), title: t.trim(), notes: "", checklist: [], tags: [], when: "anytime", deadline: null, repeat: null, projectId: id, headingId: el.dataset.hid, areaId: null, completedAt: null, created: Date.now(), order: nextOrder() }); save(); render(); } break; }
    case "projdeadline": { const p = proj(id); if (!p) break; const d = prompt("Deadline (YYYY-MM-DD, empty to remove):", p.deadline || todayStr()); if (d === null) break; if (d === "") { p.deadline = null; } else if (isDate(d)) { p.deadline = d; } save(); render(); break; }
    case "projmove": projMoveSheet(id); break;
    case "setprojarea": { const p = proj(id); if (p) { p.areaId = el.dataset.v || null; save(); } closeModal(); render(); break; }
    case "projcomplete": {
      const p = proj(id); if (!p) break;
      const openIn = db.items.filter(i => i.projectId === id && !i.completedAt);
      if (!confirm('Complete "' + p.title + '"' + (openIn.length ? " and its " + openIn.length + " remaining to-dos" : "") + "?")) break;
      openIn.forEach(i => i.completedAt = Date.now());
      p.completedAt = Date.now(); save(); goBack(); break;
    }
    case "projdelete": {
      const p = proj(id); if (!p) break;
      if (!confirm('Delete project "' + p.title + '" and all its to-dos? This cannot be undone.')) break;
      db.items = db.items.filter(i => i.projectId !== id);
      db.projects = db.projects.filter(x => x.id !== id); save(); goBack(); break;
    }
    case "areadelete": {
      const a = area(id); if (!a) break;
      if (!confirm('Delete area "' + a.title + '"? Projects inside will be kept (unfiled).')) break;
      db.projects.forEach(p => { if (p.areaId === id) p.areaId = null; });
      db.items.forEach(i => { if (i.areaId === id) i.areaId = null; });
      db.areas = db.areas.filter(x => x.id !== id); save(); goBack(); break;
    }
    case "theme": themeSheet(); break;
    case "settheme": db.settings.theme = el.dataset.v; save(); closeModal(); render(); break;
    case "export": {
      const blob = new Blob([JSON.stringify(db, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "do-things-backup-" + todayStr() + ".json";
      a.click(); break;
    }
  }
});

/* live inputs (no re-render while typing) */
document.addEventListener("input", e => {
  const el = e.target;
  if (el.dataset && el.dataset.live) {
    const it = db.items.find(x => x.id === el.dataset.id); if (!it) return;
    if (el.dataset.live === "title") it.title = el.value;
    else if (el.dataset.live === "notes") { it.notes = el.value; el.style.height = "auto"; el.style.height = el.scrollHeight + "px"; }
    else if (el.dataset.live === "cktext") { const c = it.checklist.find(c => c.id === el.dataset.cid); if (c) c.text = el.value; }
    save();
  } else if (el.dataset && el.dataset.key === "search") {
    state.view.q = el.value;
    const pos = el.selectionStart;
    render();
    const s = document.getElementById("searchinput");
    if (s) { s.focus(); s.setSelectionRange(pos, pos); }
  } else if (el.id === "importfile") {
    const f = el.files[0]; if (!f) return;
    f.text().then(txt => {
      try {
        const data = JSON.parse(txt);
        if (!data.items || !data.projects) throw new Error("bad");
        if (confirm("Replace everything on this phone with the backup (" + data.items.length + " to-dos)?")) {
          db = data; save(); state = { view: { type: "home" }, stack: [], editing: null, filterTag: null }; render();
        }
      } catch (_) { alert("That file doesn't look like a valid backup."); }
    });
  }
});
document.addEventListener("keydown", e => {
  const el = e.target;
  if (el.dataset && el.dataset.key === "tagadd" && e.key === "Enter") {
    e.preventDefault();
    const it = db.items.find(x => x.id === el.dataset.id);
    const t = el.value.trim();
    if (it && t && !it.tags.includes(t)) { it.tags.push(t); save(); render();
      setTimeout(() => { const inp = document.querySelector('[data-key="tagadd"]'); if (inp) inp.focus(); }, 50); }
    else el.value = "";
  }
});
/* contenteditable titles for project/area/heading */
document.addEventListener("focusout", e => {
  const el = e.target;
  if (!el.dataset || !el.dataset.editfield) return;
  const txt = el.textContent.trim();
  if (el.dataset.editfield === "ptitle") { const p = proj(el.dataset.id); if (p && txt) p.title = txt; }
  else if (el.dataset.editfield === "pnotes") { const p = proj(el.dataset.id); if (p) p.notes = txt; }
  else if (el.dataset.editfield === "atitle") { const a = area(el.dataset.id); if (a && txt) a.title = txt; }
  else if (el.dataset.editfield === "heading") { const p = proj(el.dataset.id); const hd = p && (p.headings||[]).find(h => h.id === el.dataset.hid); if (hd && txt) hd.title = txt; }
  save();
});

/* iOS Safari: register a touch listener so CSS :active press states actually fire */
document.addEventListener("touchstart", function () {}, { passive: true });

/* service worker (only when hosted over https) */
if ("serviceWorker" in navigator && location.protocol === "https:") {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}
render();
</script>
